<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SAA-C03 문제집</title>
<style>
:root {
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
  --mono: "SF Mono","Fira Code",Consolas,monospace;
  --bg:#0d0f18; --surface:#141720; --surface2:#1c2030; --surface3:#232840;
  --border:#2a2f4a; --border2:#343b60; --accent:#5b8cff;
  --accent-dim:rgba(91,140,255,0.12); --correct:#10b981;
  --correct-dim:rgba(16,185,129,0.1); --wrong:#f43f5e;
  --wrong-dim:rgba(244,63,94,0.1); --text:#dde1f0;
  --text-dim:#7a83a8; --text-dimmer:#4a5270;
  --hh:52px; --th:50px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* 로그인 */
#view-login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:360px;}
.login-logo{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:0.1em;background:var(--accent-dim);border:1px solid rgba(91,140,255,0.2);border-radius:8px;padding:6px 14px;display:inline-block;margin-bottom:20px;}
.login-title{font-size:20px;font-weight:700;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text-dim);margin-bottom:24px;line-height:1.6;}
.login-label{font-size:12px;color:var(--text-dim);margin-bottom:5px;display:block;}
.login-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;font-family:var(--font);outline:none;transition:border-color 0.2s;margin-bottom:12px;}
.login-input:focus{border-color:var(--accent);}
.login-input::placeholder{color:var(--text-dimmer);}
.login-error{font-size:12px;color:var(--wrong);margin-bottom:10px;display:none;padding:8px 12px;background:var(--wrong-dim);border-radius:7px;}
.login-error.show{display:block;}
.login-btn{width:100%;padding:13px;border-radius:10px;border:none;background:var(--accent);color:white;font-size:15px;font-weight:600;font-family:var(--font);cursor:pointer;margin-bottom:14px;}
.login-btn:active{opacity:0.8;}
.login-btn:disabled{opacity:0.5;cursor:default;}
.login-hint{font-size:11px;color:var(--text-dimmer);line-height:1.7;background:var(--surface2);border-radius:8px;padding:10px 12px;}

/* 로딩 */
#view-loading{display:none;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;}
#view-loading.on{display:flex;}
.spinner{width:36px;height:36px;border-radius:50%;border:3px solid var(--border2);border-top-color:var(--accent);animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:14px;color:var(--text-dim);}

/* 앱 */
#view-app{display:none;}
#view-app.on{display:block;}

.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:var(--hh);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);}
.hdr-right{display:flex;align-items:center;gap:8px;}
.user-chip{font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;color:var(--text-dim);display:flex;align-items:center;gap:5px;max-width:130px;}
.user-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.score-chip{font-family:var(--mono);font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;color:var(--text-dim);}
.score-chip b{color:var(--correct);}
.score-chip .ws{color:var(--wrong);}
.icon-btn{width:34px;height:34px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;}

.sync-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:5px 14px;font-size:11px;color:var(--text-dimmer);display:flex;align-items:center;gap:6px;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dimmer);flex-shrink:0;}
.sync-dot.synced{background:var(--correct);}
.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite;}
.sync-dot.error{background:var(--wrong);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

#view-home{display:block;}
#view-quiz{display:none;}

.home-wrap{padding:18px 14px 120px;}
.home-title{font-size:20px;font-weight:700;margin-bottom:4px;}
.home-sub{font-size:13px;color:var(--text-dim);margin-bottom:18px;}
.overall-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:18px;}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.stat-box{background:var(--surface2);border-radius:10px;padding:10px 6px;text-align:center;}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:700;display:block;}
.stat-lbl{font-size:10px;color:var(--text-dim);margin-top:2px;display:block;}
.bar-row{display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-bottom:6px;}
.bar-out{height:7px;background:var(--surface3);border-radius:4px;overflow:hidden;}
.bar-in{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),#8b5cf6);transition:width 0.5s;}
.sec-title{font-size:11px;font-weight:600;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 11px;cursor:pointer;position:relative;overflow:hidden;}
.cat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat-color,var(--accent));}
.cat-card:active{opacity:0.8;}
.cat-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:9px;}
.cat-icon{font-size:17px;flex-shrink:0;}
.cat-name{font-size:13px;font-weight:600;line-height:1.3;flex:1;}
.cat-cnt{font-family:var(--mono);font-size:10px;color:var(--text-dim);background:var(--surface3);border-radius:8px;padding:2px 6px;white-space:nowrap;flex-shrink:0;}
.cat-prow{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:5px;}
.cat-bar{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.cat-bar-in{height:100%;border-radius:2px;background:var(--cat-color,var(--accent));transition:width 0.4s;}
.cat-stats{display:flex;gap:5px;}
.cs{font-size:10px;padding:2px 6px;border-radius:4px;}
.cs-c{background:var(--correct-dim);color:var(--correct);}
.cs-w{background:var(--wrong-dim);color:var(--wrong);}

.quiz-topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;height:var(--th);display:flex;align-items:center;gap:10px;position:sticky;top:var(--hh);z-index:200;}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text-dim);font-size:13px;cursor:pointer;white-space:nowrap;font-family:var(--font);flex-shrink:0;}
.tcat{display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.tname{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tprog{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap;flex-shrink:0;}

.mob-search{padding:8px 12px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:calc(var(--hh) + var(--th));z-index:190;}
.mob-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:15px;font-family:var(--font);outline:none;}
.mob-search input:focus{border-color:var(--accent);}
.mob-search input::placeholder{color:var(--text-dimmer);}
.mob-perpage{display:flex;align-items:center;justify-content:flex-end;padding:8px 12px 4px;gap:8px;}
.mob-perpage span{font-size:12px;color:var(--text-dimmer);}
.mob-perpage select{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;cursor:pointer;}

.quiz-main{padding:10px 12px 200px;}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.q-card.ac{border-color:rgba(16,185,129,0.4);}
.q-card.aw{border-color:rgba(244,63,94,0.4);}
.q-head{padding:14px 13px 10px;display:flex;align-items:flex-start;gap:8px;}
.q-badge{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(91,140,255,0.2);border-radius:5px;padding:3px 7px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.q-text{font-size:14px;line-height:1.7;font-weight:500;}
.opts{padding:0 12px 12px;display:flex;flex-direction:column;gap:7px;}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;user-select:none;min-height:46px;}
.opt:active:not(.dis){opacity:0.8;}
.opt.sel{border-color:var(--accent);background:var(--accent-dim);}
.opt.cor{border-color:var(--correct)!important;background:var(--correct-dim)!important;}
.opt.wrn{border-color:var(--wrong)!important;background:var(--wrong-dim)!important;}
.opt.dis{cursor:default;}
.opt-k{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text-dim);flex-shrink:0;}
.opt.sel .opt-k{background:var(--accent);border-color:var(--accent);color:#fff;}
.opt.cor .opt-k{background:var(--correct);border-color:var(--correct);color:#fff;}
.opt.wrn .opt-k{background:var(--wrong);border-color:var(--wrong);color:#fff;}
.opt-t{font-size:13.5px;line-height:1.65;padding-top:2px;}
.q-foot{display:flex;align-items:center;flex-wrap:wrap;padding:10px 12px 12px;border-top:1px solid var(--border);gap:8px;}
.rbadge{display:none;align-items:center;gap:5px;font-size:13px;font-weight:600;padding:5px 10px;border-radius:7px;}
.rbadge.show{display:flex;}
.rbadge.c{background:var(--correct-dim);color:var(--correct);}
.rbadge.w{background:var(--wrong-dim);color:var(--wrong);}
.foot-r{display:flex;align-items:center;gap:8px;margin-left:auto;}
.ans-lbl{font-size:11px;color:var(--text-dimmer);font-family:var(--mono);}
.ans-box{background:var(--surface3);color:var(--surface3);border-radius:5px;padding:4px 10px;font-family:var(--mono);font-size:13px;font-weight:700;user-select:text;border:1px solid var(--border);letter-spacing:0.1em;min-width:36px;text-align:center;}
.ans-box::selection{background:rgba(91,140,255,0.5);color:var(--text);}
.ans-box.vis{color:var(--correct);background:var(--correct-dim);border-color:rgba(16,185,129,0.3);}
.chk-btn{padding:9px 16px;border-radius:9px;border:none;background:var(--accent);color:white;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;white-space:nowrap;min-height:42px;}
.chk-btn:active:not(:disabled){opacity:0.8;}
.chk-btn:disabled{background:var(--surface3);color:var(--text-dimmer);cursor:default;}
.chk-btn.rm{background:var(--surface3);color:var(--text-dim);border:1px solid var(--border2);}

.pagination{display:flex;align-items:center;justify-content:center;gap:5px;padding:16px 0 80px;flex-wrap:wrap;}
.pg-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);border-radius:8px;min-width:42px;min-height:42px;padding:0 10px;cursor:pointer;font-size:13px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;}
.pg-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
.pg-btn[disabled]{opacity:0.3;cursor:default;}
.pg-dot{color:var(--text-dimmer);padding:0 4px;}
.pg-input-wrap{display:flex;align-items:center;gap:6px;margin-left:4px;}
.pg-input-wrap span{font-size:12px;color:var(--text-dimmer);}
.pg-input{width:52px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:0 8px;height:42px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;text-align:center;}
.pg-input:focus{border-color:var(--accent);}
.pg-total{font-size:12px;color:var(--text-dimmer);font-family:var(--mono);}

.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:none;gap:4px;padding:6px 8px;padding-bottom:max(6px,env(safe-area-inset-bottom));z-index:250;}
.bnav.on{display:flex;}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border-radius:8px;background:transparent;border:none;cursor:pointer;color:var(--text-dimmer);font-family:var(--font);}
.bn-btn.active{background:var(--accent-dim);color:var(--accent);}
.bn-icon{font-size:18px;}
.bn-lbl{font-size:9px;font-weight:500;}
.bn-cnt{font-family:var(--mono);font-size:9px;background:var(--surface3);border-radius:8px;padding:1px 5px;min-width:20px;text-align:center;}

.desk-sidebar{display:none;}
@media(min-width:768px){
  .home-wrap{padding:32px 24px 80px;max-width:900px;margin:0 auto;}
  .cat-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
  .quiz-layout{display:flex;}
  .desk-sidebar{display:flex;flex-direction:column;width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:14px 0;position:sticky;top:calc(var(--hh) + var(--th));height:calc(100vh - var(--hh) - var(--th));overflow-y:auto;}
  .ds-sec{padding:0 12px 12px;border-bottom:1px solid var(--border);margin-bottom:4px;}
  .ds-lbl{font-size:10px;font-weight:600;color:var(--text-dimmer);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;}
  .ds-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-size:13px;font-family:var(--font);outline:none;}
  .ds-input:focus{border-color:var(--accent);}
  .ds-input::placeholder{color:var(--text-dimmer);}
  .ds-fbtns{display:flex;flex-direction:column;gap:2px;}
  .ds-fbtn{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;border:none;background:transparent;color:var(--text-dim);font-size:12px;font-family:var(--font);cursor:pointer;text-align:left;}
  .ds-fbtn:hover{background:var(--surface2);color:var(--text);}
  .ds-fbtn.active{background:var(--accent-dim);color:var(--accent);}
  .ds-fdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .ds-prow{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:5px;}
  .ds-pout{height:4px;background:var(--surface3);border-radius:2px;overflow:hidden;}
  .ds-pin{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),#8b5cf6);transition:width 0.4s;}
  .ds-sel{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;color:var(--text);font-size:12px;font-family:var(--mono);outline:none;cursor:pointer;}
  .quiz-content{flex:1;min-width:0;}
  .mob-search{display:none;}
  .mob-perpage{display:none;}
  .bnav{display:none!important;}
  .quiz-main{padding:18px 20px 80px;max-width:780px;}
}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--text-dim);display:flex;align-items:center;gap:8px;z-index:9999;transition:all 0.25s;box-shadow:0 8px 32px rgba(0,0,0,0.5);white-space:nowrap;opacity:0;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:6px;height:6px;border-radius:50%;background:var(--correct);flex-shrink:0;}
</style>
</head>
<body>

<!-- 로그인 -->
<div id="view-login">
  <div class="login-card">
    <div class="login-logo">SAA-C03 · KR</div>
    <div class="login-title">AWS 문제집</div>
    <div class="login-sub">아이디와 비밀번호로 로그인하면<br>어떤 기기에서든 풀이 기록이 동기화돼요</div>
    <label class="login-label">아이디</label>
    <input class="login-input" id="uid-input" placeholder="예: yubin05" maxlength="30" autocomplete="off" autocapitalize="off">
    <label class="login-label">비밀번호</label>
    <input class="login-input" id="pw-input" type="password" placeholder="비밀번호 입력" maxlength="50" autocomplete="off">
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">로그인 / 회원가입 →</button>
    <div class="login-hint">
      💡 처음 사용 시 입력한 아이디+비밀번호로 자동 가입돼요<br>
      같은 아이디+비밀번호로 어느 기기에서든 접속 가능해요
    </div>
  </div>
</div>

<!-- 로딩 -->
<div id="view-loading">
  <div class="spinner"></div>
  <div class="loading-txt" id="loading-txt">로그인 중...</div>
</div>

<!-- 앱 -->
<div id="view-app">
  <header class="header">
    <div class="logo">SAA-C03 · KR</div>
    <div class="hdr-right">
      <div class="user-chip">👤 <span id="hdr-uid"></span></div>
      <div class="score-chip">✓<b id="hc">0</b> ✗<span class="ws" id="hw">0</span>/<span id="ht">0</span></div>
      <div class="icon-btn" onclick="doLogout()" title="로그아웃">⏏</div>
    </div>
  </header>
  <div class="sync-bar"><div class="sync-dot" id="sync-dot"></div><span id="sync-msg">연결 중...</span></div>

  <div id="view-home">
    <div class="home-wrap">
      <div class="home-title">AWS SAA-C03 문제집</div>
      <div class="home-sub" id="home-sub">총 725문제 · 카테고리별 학습</div>
      <div class="overall-card">
        <div class="stat-row">
          <div class="stat-box"><span class="stat-val" style="color:var(--accent)">677</span><span class="stat-lbl">전체</span></div>
          <div class="stat-box"><span class="stat-val" id="ov-d" style="color:var(--text)">0</span><span class="stat-lbl">푼 문제</span></div>
          <div class="stat-box"><span class="stat-val" id="ov-c" style="color:var(--correct)">0</span><span class="stat-lbl">정답</span></div>
          <div class="stat-box"><span class="stat-val" id="ov-w" style="color:var(--wrong)">0</span><span class="stat-lbl">오답</span></div>
        </div>
        <div class="bar-row"><span>진행률</span><span id="ov-p">0%</span></div>
        <div class="bar-out"><div class="bar-in" id="ov-b" style="width:0%"></div></div>
      </div>
      <div class="sec-title">카테고리</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
  </div>

  <div id="view-quiz">
    <div class="quiz-topbar">
      <button class="back-btn" onclick="goHome()">← 홈</button>
      <div class="tcat"><span class="tdot" id="td"></span><span class="tname" id="tn"></span></div>
      <span class="tprog" id="tp"></span>
    </div>
    <div class="mob-search"><input id="si-m" placeholder="🔍 문제 검색..."></div>
    <div class="quiz-layout">
      <aside class="desk-sidebar">
        <div class="ds-sec"><div class="ds-lbl">검색</div><input class="ds-input" id="si-d" placeholder="문제 검색..."></div>
        <div class="ds-sec">
          <div class="ds-lbl">필터</div>
          <div class="ds-fbtns">
            <button class="ds-fbtn active" data-f="all"><span class="ds-fdot" style="background:#7a83a8"></span>전체<span style="margin-left:auto;font-family:monospace;font-size:11px" id="d-ca">0</span></button>

<script>
let AQ=[];
const CI={"스토리지": "🗄️", "컴퓨팅": "⚙️", "네트워크": "🌐", "데이터베이스": "🗃️", "메시징": "📨", "보안/IAM": "🔐", "모니터링": "📊", "분석/AI": "🧠", "마이그레이션": "🚚", "개발자도구": "🛠️", "기타": "📌"};
const CC={"스토리지": "#3b82f6", "컴퓨팅": "#f59e0b", "네트워크": "#10b981", "데이터베이스": "#8b5cf6", "메시징": "#ec4899", "보안/IAM": "#ef4444", "모니터링": "#06b6d4", "분석/AI": "#a855f7", "마이그레이션": "#f97316", "개발자도구": "#84cc16", "기타": "#6b7280"};
const SB_URL='https://nxmwacfrvfzbjufqiwdg.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im54bXdhY2ZydmZ6Ymp1ZnFpd2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyNjI4NzgsImV4cCI6MjA5NDgzODg3OH0.a70Gx1VQDoGRDyUxA6HDoMFo8mCebAIQeDFbkuaofCM';

let qs={}, uid='', cat=null, page=1, pp=10, flt='all', st='', fl=[];
let syncTimer=null;

// ── 비밀번호 해시 (간단한 SHA-256) ──
async function hashPw(pw){
  const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── 로그인 ──
async function doLogin(){
  const id=document.getElementById('uid-input').value.trim();
  const pw=document.getElementById('pw-input').value;
  const err=document.getElementById('login-error');

  if(!id){ err.textContent='아이디를 입력해주세요'; err.classList.add('show'); return; }
  if(id.length<2){ err.textContent='아이디는 2글자 이상이어야 해요'; err.classList.add('show'); return; }
  if(!pw){ err.textContent='비밀번호를 입력해주세요'; err.classList.add('show'); return; }
  if(pw.length<4){ err.textContent='비밀번호는 4자 이상이어야 해요'; err.classList.add('show'); return; }

  err.classList.remove('show');
  document.getElementById('login-btn').disabled=true;
  document.getElementById('view-login').style.display='none';
  document.getElementById('view-loading').classList.add('on');
  document.getElementById('loading-txt').textContent='로그인 중...';

  const pwHash=await hashPw(pw);
  const result=await tryLogin(id, pwHash);

  if(result.ok){
    localStorage.setItem(LS_KEY, JSON.stringify({uid:id, pwHash}));
    await startApp(id, result.data);
  } else {
    document.getElementById('view-loading').classList.remove('on');
    document.getElementById('view-login').style.display='flex';
    document.getElementById('login-btn').disabled=false;
    err.textContent=result.msg;
    err.classList.add('show');
  }
}

// 로그인 시도: 신규면 가입, 기존이면 비번 확인
async function tryLogin(id, pwHash){
  try{
    // 테이블 존재 확인 & 없으면 생성
    await ensureTable();

    // 유저 조회
    const res=await fetch(`${SB_URL}/rest/v1/progress?user_id=eq.${encodeURIComponent(id)}&select=user_id,pw_hash,data`,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(!res.ok) throw new Error(await res.text());
    const rows=await res.json();

    if(rows.length===0){
      // 신규 가입
      const ins=await fetch(`${SB_URL}/rest/v1/progress`,{
        method:'POST',
        headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
        body:JSON.stringify({user_id:id, pw_hash:pwHash, data:{}, updated_at:new Date().toISOString()})
      });
      if(!ins.ok) throw new Error(await ins.text());
      return {ok:true, data:{}};
    } else {
      // 비번 확인
      if(rows[0].pw_hash !== pwHash) return {ok:false, msg:'비밀번호가 틀렸어요'};
      return {ok:true, data:rows[0].data||{}};
    }
  } catch(e){
    console.error(e);
    return {ok:false, msg:'서버 연결 실패: '+e.message};
  }
}

// 테이블 없으면 생성 (RPC 통해 SQL 실행)
async function ensureTable(){
  const sql=`
    CREATE TABLE IF NOT EXISTS progress (
      user_id TEXT PRIMARY KEY,
      pw_hash TEXT NOT NULL DEFAULT '',
      data JSONB NOT NULL DEFAULT '{}',
      updated_at TIMESTAMP DEFAULT NOW()
    );
    ALTER TABLE progress ENABLE ROW LEVEL SECURITY;
    DO $$ BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_policies WHERE tablename='progress' AND policyname='open_access') THEN
        CREATE POLICY open_access ON progress FOR ALL USING (true) WITH CHECK (true);
      END IF;
    END $$;
  `;
  try{
    await fetch(`${SB_URL}/rest/v1/rpc/exec_sql`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({sql})
    });
  }catch(e){/* 실패해도 계속 진행 - 이미 테이블이 있을 수 있음 */}
}

async function startApp(id, savedData){
  uid=id;
  qs=savedData||{};
  document.getElementById('view-loading').classList.remove('on');
  document.getElementById('view-app').classList.add('on');
  document.getElementById('hdr-uid').textContent=uid;
  document.getElementById('home-sub').textContent=uid+' 님 · 총 725문제 · 기기 간 동기화';
  setSyncStatus('synced','동기화됨');
  renderHome();
}

// 자동 로그인
window.addEventListener('DOMContentLoaded', async ()=>{
  try{
    const r=await fetch('./AQ.json');
    if(!r.ok) throw new Error('HTTP '+r.status);

  }catch(e){
    document.getElementById('view-loading').classList.add('on');
    document.getElementById('loading-txt').textContent='문제 파일 로드 실패: '+e.message;
    return;
  }
  const saved=localStorage.getItem(LS_KEY);
  if(saved){
    try{
      const {uid:id, pwHash}=JSON.parse(saved);

      document.getElementById('view-loading').classList.add('on');
      document.getElementById('loading-txt').textContent=id+' 님으로 자동 로그인 중...';
      const result=await tryLogin(id, pwHash);
      if(result.ok){
        await startApp(id, result.data);
      } else {
        localStorage.removeItem(LS_KEY);
        document.getElementById('view-loading').classList.remove('on');
        document.getElementById('view-login').style.display='flex';
      }
    }catch(e){
      localStorage.removeItem(LS_KEY);
      document.getElementById('view-loading').classList.remove('on');
      document.getElementById('view-login').style.display='flex';
    }
  }
});

document.getElementById('uid-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pw-input').focus();});
document.getElementById('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doLogout(){
  if(!confirm('로그아웃 하시겠어요?')) return;

  location.reload();
}

// ── Supabase 저장 ──
async function sbSave(){
  setSyncStatus('syncing','저장 중...');
  try{
    const res=await fetch(`${SB_URL}/rest/v1/progress`,{
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({user_id:uid, pw_hash: JSON.parse(localStorage.getItem(LS_KEY)||'{}').pwHash||'', data:qs, updated_at:new Date().toISOString()})
    });
    if(!res.ok) throw new Error(await res.text());
    setSyncStatus('synced','동기화됨');
  }catch(e){
    setSyncStatus('error','저장 실패');
    toast('⚠️ 저장 실패 - 재시도 중...');
    setTimeout(sbSave, 3000);
  }
}

function debounceSave(){ clearTimeout(syncTimer); syncTimer=setTimeout(sbSave,1000); }
function setSyncStatus(t,m){ document.getElementById('sync-dot').className='sync-dot '+t; document.getElementById('sync-msg').textContent=m; }

async function resetAll(){
  if(!confirm('모든 풀이 기록을 초기화할까요?')) return;
  qs={};
  await sbSave();
  toast('🗑 초기화됨');
  renderHome();
  goHome();
}

let tt;
function toast(msg){ document.getElementById('tm').textContent=msg; const el=document.getElementById('toast'); el.classList.add('show'); clearTimeout(tt); tt=setTimeout(()=>el.classList.remove('show'),2500); }
function gs(n){ if(!qs[n])qs[n]={sel:[],chk:false,cor:false}; return qs[n]; }
function eh(s){ return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function goHome(){
  document.getElementById('view-home').style.display='block';
  document.getElementById('view-quiz').style.display='none';
  document.getElementById('bnav').classList.remove('on');
  renderHome();
}

function renderHome(){
  // 전체 문제 기준으로 진행률 계산
  const allChk=AQ.filter(q=>gs(q.num).chk);
  const allCor=allChk.filter(q=>gs(q.num).cor);
  const pct=Math.round(allChk.length/AQ.length*100);
  document.getElementById('ov-d').textContent=allChk.length;
  document.getElementById('ov-c').textContent=allCor.length;
  document.getElementById('ov-w').textContent=allChk.length-allCor.length;
  document.getElementById('ov-p').textContent=pct+'%';
  document.getElementById('ov-b').style.width=pct+'%';

  const cats=[...new Set(AQ.map(q=>q.category))].sort();
  let h=`<div class="cat-card" style="--cat-color:#5b8cff" onclick="enterCat(null)">
    <div class="cat-top"><span class="cat-icon">📚</span><span class="cat-name">전체 문제</span><span class="cat-cnt">${AQ.length}</span></div>
    <div class="cat-prow"><span>진행률</span><span>${pct}%</span></div>
    <div class="cat-bar"><div class="cat-bar-in" style="width:${pct}%;background:#5b8cff"></div></div>
    <div class="cat-stats"><span class="cs cs-c">✓${allCor.length}</span><span class="cs cs-w">✗${allChk.length-allCor.length}</span></div>
  </div>`;
  cats.forEach(c=>{
    const cq=AQ.filter(q=>q.category===c);
    const cd=cq.filter(q=>gs(q.num).chk);
    const cc=cd.filter(q=>gs(q.num).cor);
    const cp=cq.length?Math.round(cd.length/cq.length*100):0;
    const col=CC[c]||'#5b8cff';
    h+=`<div class="cat-card" style="--cat-color:${col}" onclick="enterCat('${c}')">
      <div class="cat-top"><span class="cat-icon">${CI[c]||'📌'}</span><span class="cat-name">${c}</span><span class="cat-cnt">${cq.length}</span></div>
      <div class="cat-prow"><span>진행률</span><span>${cp}%</span></div>
      <div class="cat-bar"><div class="cat-bar-in" style="width:${cp}%;background:${col}"></div></div>
      <div class="cat-stats"><span class="cs cs-c">✓${cc.length}</span><span class="cs cs-w">✗${cd.length-cc.length}</span></div>
    </div>`;
  });
  document.getElementById('cat-grid').innerHTML=h;
  updHdr();
}

function enterCat(c){
  cat=c;page=1;flt='all';st='';
  document.getElementById('si-m').value=''; document.getElementById('si-d').value='';
  document.querySelectorAll('.ds-fbtn').forEach(b=>b.classList.toggle('active',b.dataset.f==='all'));
  document.querySelectorAll('.bn-btn').forEach(b=>b.classList.toggle('active',b.dataset.f==='all'));
  document.getElementById('td').style.background=c?(CC[c]||'#5b8cff'):'#5b8cff';
  document.getElementById('tn').textContent=c?(CI[c]||'📌')+' '+c:'📚 전체 문제';
  document.getElementById('view-home').style.display='none';
  document.getElementById('view-quiz').style.display='block';
  document.getElementById('bnav').classList.add('on');
  renderAll();
}

function getCQ(){ return cat?AQ.filter(q=>q.category===cat):AQ; }
function renderAll(){ applyFlt();renderQs();updCnts();updHdr(); }
function applyFlt(){
  let b=getCQ();
  if(st)b=b.filter(q=>q.text.toLowerCase().includes(st)||q.num.toLowerCase().includes(st)||Object.values(q.options||{}).some(v=>v.toLowerCase().includes(st)));
  if(flt==='unanswered')b=b.filter(q=>!gs(q.num).chk);
  else if(flt==='correct')b=b.filter(q=>gs(q.num).chk&&gs(q.num).cor);
  else if(flt==='wrong')b=b.filter(q=>gs(q.num).chk&&!gs(q.num).cor);
  fl=b; if(page>Math.ceil(fl.length/pp))page=1;
}

function renderQs(){
  const cq=getCQ(), done=cq.filter(q=>gs(q.num).chk).length;
  document.getElementById('tp').textContent=done+'/'+cq.length;
  const pageQs=fl.slice((page-1)*pp, page*pp);
  document.getElementById('qc').innerHTML=pageQs.map(q=>{
    const s=gs(q.num), multi=q.answer&&q.answer.length>1;
    const cc=s.chk?(s.cor?'ac':'aw'):'';
    const oh=Object.entries(q.options||{}).map(([k,v])=>{
      let cl='opt';
      if(s.chk){cl+=' dis';if(q.answer.includes(k))cl+=' cor';else if(s.sel.includes(k))cl+=' wrn';}
      else if(s.sel.includes(k))cl+=' sel';
      return `<div class="${cl}" data-n="${q.num}" data-o="${k}"><div class="opt-k">${k}</div><div class="opt-t">${eh(v)}</div></div>`;
    }).join('');
    const rh=s.chk?`<div class="rbadge ${s.cor?'c':'w'} show">${s.cor?'✓ 정답!':'✗ 오답'}</div>`:`<div class="rbadge"></div>`;
    const mh=multi?`<span style="font-size:11px;color:var(--text-dimmer)"> (복수정답 ${q.answer.length}개)</span>`:'';
    return `<div class="q-card ${cc}">
      <div class="q-head"><span class="q-badge">${q.num}</span><span class="q-text">${eh(q.text)}${mh}</span></div>
      <div class="opts">${oh}</div>
      <div class="q-foot">${rh}<div class="foot-r"><span class="ans-lbl">정답</span><span class="ans-box ${s.chk?'vis':''}">${q.answer}</span><button class="chk-btn${s.chk?' rm':''}" ${!s.chk&&!s.sel.length?'disabled':''} onclick="doChk('${q.num}','${q.answer}')">${s.chk?'다시 풀기':'확인'}</button></div></div>
    </div>`;
  }).join('');
  document.querySelectorAll('.opt:not(.dis)').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=el.dataset.n,o=el.dataset.o,q=AQ.find(x=>x.num===n),s=gs(n);
      if(q.answer.length>1){if(s.sel.includes(o))s.sel=s.sel.filter(x=>x!==o);else s.sel.push(o);}
      else s.sel=[o];
      renderQs();
    });
  });
  renderPg();
}

function doChk(n,ans){
  const s=gs(n);
  if(s.chk){s.sel=[];s.chk=false;s.cor=false;}
  else{if(!s.sel.length)return;s.chk=true;s.cor=[...s.sel].sort().join('')===[...ans].sort().join('');}
  debounceSave();
  applyFlt();renderQs();updCnts();updHdr();
  // 홈 진행률도 업데이트
  updateHomeStats();
}

function updateHomeStats(){
  const allChk=AQ.filter(q=>gs(q.num).chk);
  const allCor=allChk.filter(q=>gs(q.num).cor);
  const pct=Math.round(allChk.length/AQ.length*100);
  document.getElementById('ov-d').textContent=allChk.length;
  document.getElementById('ov-c').textContent=allCor.length;
  document.getElementById('ov-w').textContent=allChk.length-allCor.length;
  document.getElementById('ov-p').textContent=pct+'%';
  document.getElementById('ov-b').style.width=pct+'%';
}

function updCnts(){
  const b=getCQ(), sr=st?b.filter(q=>q.text.toLowerCase().includes(st)||Object.values(q.options||{}).some(v=>v.toLowerCase().includes(st))):b;
  const chk=b.filter(q=>gs(q.num).chk), cor=chk.filter(q=>gs(q.num).cor);
  ['d-ca','m-ca'].forEach(id=>document.getElementById(id).textContent=sr.length);
  ['d-cu','m-cu'].forEach(id=>document.getElementById(id).textContent=b.filter(q=>!gs(q.num).chk).length);
  ['d-cc','m-cc'].forEach(id=>document.getElementById(id).textContent=cor.length);
  ['d-cw','m-cw'].forEach(id=>document.getElementById(id).textContent=chk.length-cor.length);
  const pct=b.length?Math.round(chk.length/b.length*100):0;
  document.getElementById('sp-b').style.width=pct+'%';
  document.getElementById('sp-t').textContent=chk.length+'/'+b.length;
}

function updHdr(){
  const chk=AQ.filter(q=>gs(q.num).chk), cor=chk.filter(q=>gs(q.num).cor);
  document.getElementById('hc').textContent=cor.length;
  document.getElementById('hw').textContent=chk.length-cor.length;
  document.getElementById('ht').textContent=chk.length;
}

function mf(btn,f){
  flt=f;page=1;
  document.querySelectorAll('.bn-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.ds-fbtn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  renderAll();window.scrollTo({top:0,behavior:'smooth'});
}

function renderPg(){
  const tot=Math.ceil(fl.length/pp), el=document.getElementById('pg');
  if(tot<=1){el.innerHTML='';return;}
  let ps=[];
  if(tot<=7)for(let i=1;i<=tot;i++)ps.push(i);
  else{ps=[1];if(page>3)ps.push('…');for(let i=Math.max(2,page-1);i<=Math.min(tot-1,page+1);i++)ps.push(i);if(page<tot-2)ps.push('…');ps.push(tot);}
  el.innerHTML=
    `<button class="pg-btn" ${page===1?'disabled':''} onclick="gp(${page-1})">&lsaquo;</button>`+
    ps.map(p=>p==='…'?`<span class="pg-dot">…</span>`:`<button class="pg-btn ${p===page?'active':''}" onclick="gp(${p})">${p}</button>`).join('')+
    `<button class="pg-btn" ${page===tot?'disabled':''} onclick="gp(${page+1})">&rsaquo;</button>`+
    `<div class="pg-input-wrap">
      <input class="pg-input" id="pg-jump" type="number" min="1" max="${tot}" value="${page}" title="${tot}페이지 중 이동할 페이지 입력">
      <span class="pg-total">/ ${tot}</span>
    </div>`;
  document.getElementById('pg-jump').addEventListener('change', function(){
    const v=parseInt(this.value);
    if(v>=1&&v<=tot) gp(v);
    else this.value=page;
  });
  document.getElementById('pg-jump').addEventListener('keydown', function(e){
    if(e.key==='Enter'){
      const v=parseInt(this.value);
      if(v>=1&&v<=tot) gp(v);
      else this.value=page;
    }
  });
}
function gp(p){ const tot=Math.ceil(fl.length/pp); if(p<1||p>tot)return; page=p;renderQs();renderPg();window.scrollTo({top:0,behavior:'smooth'}); }
